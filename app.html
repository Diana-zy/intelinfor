<!DOCTYPE html>
<html>
  <head {{ HEAD_ATTRS }}>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    {{ HEAD }}
    <script src="/trackEvent.js"></script>
    <script src="/linkMarking.js"></script>
    <script>
      async function getUserNetWork() {
        try {
          // f9f124f6b4cbd81c24cb  samlili0715@gmail.com
          // 98d9be0d2e66cc3db2db  pengzhengang@himobi.cc
          const res = await fetch("https://api.ipapi.is/?key=f9f124f6b4cbd81c24cb");
          const data = await res.json();
          if (data?.ip) {
            window.dataLayer.push({
              event: "Page_View_IP_Api",
              hi_ip: data.ip,
              hi_country: data.location.country_code
            });
          }
        } catch (e) {
          console.log("error");
        }
      }

      const searchParams = new URLSearchParams(window.location.search);
      const ttclid = searchParams.get("ttclid"); //TikTok
      const tblci = searchParams.get("tblci"); //Taboola
      const dicbo = searchParams.get("dicbo"); //Outbrain
      ttclid && window.setCookie("hi_ttclid", ttclid);
      tblci && window.setCookie("hi_tblci", tblci);
      dicbo && window.setCookie("hi_dicbo", dicbo);

      const script = document.createElement("script");
      script.src = "https://wc.bunchthings.com/youknowwho.js?" + Date.now();
      document.head.appendChild(script);
      script.onload = function () {
        window.dataLayer = window.dataLayer || [];
        window.dataLayer.push({
          event: "Page_View_Ip",
          hi_ip: window.youknowwho_ip || "unknown",
          hi_country: window.youknowwho_ip_country || "unknown"
        });
        const channel = searchParams.get("channel");
        // 搜索结果页获取用户的ip
        if (channel && channel == 4060649373 && window.location.pathname.startsWith("/search")) {
          getUserNetWork();
        }
      };
    </script>
    <script async="async" src="https://www.google.com/adsense/search/ads.js"></script>
    <script type="text/javascript" charset="utf-8">
      (function (g, o) {

        if ("serviceWorker" in window.navigator) {
          window.navigator.serviceWorker
            .register("/sw.js")

  <body {{ BODY_ATTRS }} tabindex="0">
    <!-- Google Tag Manager (noscript) -->
    <noscript
      ><iframe
        src="https://www.googletagmanager.com/ns.html?id=GTM-5JQ97Q34"
        height="0"
        width="0"
        style="display: none; visibility: hidden"
      ></iframe
    ></noscript>
    <!-- End Google Tag Manager (noscript) -->
    {{ APP }}
    <script>
      window.done = false;
      window.done1 = false;
      // 监听失去焦点事件
      window.addEventListener("blur", () => {
        const activeElement = document.activeElement;
        const activeSrc = activeElement.getAttribute("src");

        // afs埋点
        if (activeSrc && activeSrc.includes("afs/ads?")) {
          if (activeElement.getAttribute("title")) {
            dataLayer.push({ event: "D_AR" });
          } else {
            dataLayer.push({ event: "D_AC" });
          }
        }
      });

      window.addEventListener("beforeunload", () => {
        if (!window.done) {
          // 处理 AFS 广告埋点逻辑
          const activeElement = document.activeElement;
          const src = activeElement?.getAttribute("src") || "";
          let eventName = "";

          if (window.location.pathname.startsWith("/detail")) {
            if (
              src &&
              src.includes("afs/ads?") &&
              activeElement.getAttribute("id") === "master-1"
            ) {
              window.pushEventParamsToGtm("T_AC_FIRST");
            } else if (
              src &&
              src.includes("afs/ads/i/") &&
              activeElement.getAttribute("id") === "slave-1-1"
            ) {
              window.pushEventParamsToGtm("T_AC_SECOND");
              window.pushEventParamsToGtm("T_AC");
            }
          }

          if (src.includes("afs/ads?")) {
            if (activeElement.getAttribute("title")) {
              window.trackEventToPixel("T_AR");

              window.pushEventParamsToGtm("T_AR");
            } else {
              window.pushEventParamsToGtm("T_AC");
            }
          } else if (
            src.includes("afs/ads/i/") &&
            !window.location.pathname.startsWith("/detail")
          ) {
            eventName = "T_AG";
          }

          if (eventName) {
            dataLayer.push({ event: eventName });
            window.done = true;
          }
        }
      });

      window.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "visible") {
          setTimeout(() => {
            window.done = false;
            window.done1 = false;
            window.focus();
          }, 0);
        }
      });

      function HandleMessageTACANDTAR(e) {
        if (window.done1) {
          return;
        }
        const activeElement = document.activeElement;
        const src = activeElement?.getAttribute("src") || "";
        if (src.includes("afs/ads?")) {
          if (!activeElement.getAttribute("title")) {
            window.trackEventToPixel("T_AC_MSG");

            dataLayer.push({ event: "T_AC_MSG" });
            window.done1 = true;
          }
        } else if (
          src &&
          src.includes("afs/ads/i/") &&
          activeElement.getAttribute("id") === "slave-1-1" &&
          window.location.pathname.startsWith("/detail")
        ) {
          window.trackEventToPixel("T_AC_MSG");

          dataLayer.push({ event: "T_AC_MSG" });
          window.done1 = true;
        }
      }

      //TAC和TAR埋点监听消息
      window.addEventListener("message", (e) => {
        if (typeof e.data === "string" && e?.data?.startsWith("FSXDC,.aCS:")) {
          HandleMessageTACANDTAR();
        }
      });
    </script>
  </body>
</html>
