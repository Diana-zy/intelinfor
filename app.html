    <script>
      async function getUserNetWork() {
        try {
          // f9f124f6b4cbd81c24cb  samlili0715@gmail.com
          // 98d9be0d2e66cc3db2db  pengzhengang@himobi.cc
          const res = await fetch("https://api.ipapi.is/?key=f9f124f6b4cbd81c24cb");
          const data = await res.json();
          if (data?.ip) {
            window.dataLayer.push({
              event: "Page_View_IP_Api",
              hi_ip: data.ip,
              hi_country: data.location.country_code
            });
          }
        } catch (e) {
          console.log("error");
        }
      }

      const searchParams = new URLSearchParams(window.location.search);
      const ttclid = searchParams.get("ttclid"); //TikTok
      const tblci = searchParams.get("tblci"); //Taboola
      const dicbo = searchParams.get("dicbo"); //Outbrain
      ttclid && window.setCookie("hi_ttclid", ttclid);
      tblci && window.setCookie("hi_tblci", tblci);
      dicbo && window.setCookie("hi_dicbo", dicbo);

      const script = document.createElement("script");
      script.src = "https://wc.bunchthings.com/youknowwho.js?" + Date.now();
      document.head.appendChild(script);
      script.onload = function () {
        // 获取用户的时区
        const userTimeZone = Intl.DateTimeFormat().resolvedOptions().timeZone;
        window.dataLayer = window.dataLayer || [];
        // window.dataLayer.push({
        //   event: "Page_View_Ip",
        //   hi_ip: window.youknowwho_ip || "unknown",
        //   hi_country: window.youknowwho_ip_country || "unknown",
        //   hi_language: navigator.languages.join("|") || navigator.language || "unknown",
        //   hi_timeZone: userTimeZone || "unknown"
        // });
        pushEventToGTM('Page_View_Ip',{
          hi_ip: window.youknowwho_ip || "unknown",
          hi_country: window.youknowwho_ip_country || "unknown",
          hi_language: navigator.languages.join("|") || navigator.language || "unknown",
          hi_timeZone: userTimeZone || "unknown",
        })

        /* ipapi获取用户ip start */
        const channel = searchParams.get("channel");
        // 搜索结果页获取用户的ip
        if (channel && channel == 4060649373 && window.location.pathname.startsWith("/search")) {
          getUserNetWork();
        }
        /* ipapi获取用户ip end */

        /* 埋点渠道的子渠道id start */
        window.getOutbrainSiteId();
        /* 埋点渠道的子渠道id end */
      };
    </script>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-HNSBNMQFHT"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function legacyUUID() {
        return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
          const r = Math.random() * 16 | 0;
          const v = c === 'x' ? r : (r & 0x3 | 0x8);
          return v.toString(16);
        });
      }
      let uuid =  window.getCookie('hi_user_id')
      if(!uuid){
        uuid = legacyUUID().replace(/-/g, "")
        window.setCookie('hi_user_id',uuid)
      }
      gtag('set','user_properties',{
        'hi_user_id':uuid,
        'hi_channel_user':getValueByURLOrCookie('channel')
      })
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());

      gtag("config", "G-HNSBNMQFHT");

      //拦截fetch
      (function () {
        const { fetch: originalFetch } = window;
        window.fetch = async (...args) => {
          let [resource, config] = args;
          // console.log(args,'args');
          if(resource.includes('https://www.google-analytics.com/g/collect')){
            if(!resource.includes("up.hi_user_id="+uuid)){
              resource = resource + "&up.hi_user_id="+uuid
            }
            if(!resource.includes("up.hi_channel_user="+getValueByURLOrCookie('channel'))){
              resource = resource + "&up.hi_channel_user="+getValueByURLOrCookie('channel')
            }
          }
          // 发送请求
          return await originalFetch(resource, config);
        };
      })()
    </script>
    <script>
      //Detail_pv_user
      (function () {
        const { pathname } = window.location
        const hi_source = getValueByURLOrCookie('hi_source')
        const {hi_source_clid} = getInfoBySource(hi_source)
        if(pathname.includes('/detail')){
          window.setCookieTomorrow('detail_time',new Date().getTime())
          const detailPvUser = window.getCookie('detailPvUser')
          if(detailPvUser){
            let buffer = {}
            try {
              buffer = JSON.parse(detailPvUser)
              if(!buffer[hi_source_clid]){
                buffer[hi_source_clid] = {
                  isPush:true,
                  time:new Date().getTime()
                }
                //两次clid无点击逻辑按子渠道存
                if(!buffer[getHostname()+'_isPushGtm']){
                  if(buffer[getHostname()+'_first']){
                    if(!buffer[getHostname()+'_second'] && buffer[getHostname()+'_first'] !==hi_source_clid){
                      buffer[getHostname()+'_second'] = hi_source_clid
                    }
                  } else {
                    buffer[getHostname()+'_first'] = hi_source_clid
                  }
                }
                pushEventToGTM('Detail_pv_user')
                setCookieTomorrow('detailPvUser',JSON.stringify(buffer))
              }
            }catch (e) {}
          } else {
            let buffer = {}
            buffer[hi_source_clid]={
              isPush:true,
              time:new Date().getTime()
            }
            buffer[getHostname()+'_first'] = hi_source_clid
            pushEventToGTM('Detail_pv_user')
            setCookieTomorrow('detailPvUser',JSON.stringify(buffer))

          }
        }
      })()
    </script>

    <script>
      window.done = false;
      window.done1 = false;
      window.done2 = false;
      // 监听失去焦点事件
      window.addEventListener("blur", () => {
        const activeElement = document.activeElement;
        const activeSrc = activeElement.getAttribute("src");

        // afs埋点
        if (activeSrc && activeSrc.includes("afs/ads?")) {
          if (activeElement.getAttribute("title")) {
            dataLayer.push({ event: "D_AR" });
          } else {
            dataLayer.push({ event: "D_AC" });
          }
        }
      });

      window.addEventListener("beforeunload", () => {
        if (!window.done) {
          // 处理 AFS 广告埋点逻辑
          const activeElement = document.activeElement;
          const src = activeElement?.getAttribute("src") || "";
          let eventName = "";

          if (window.location.pathname.startsWith("/detail")) {
            if (
              src &&
              src.includes("afs/ads?") &&
              activeElement.getAttribute("id") === "master-1"
            ) {
              window.pushEventParamsToGtm("T_AC_FIRST");
            } else if (
              src &&
              src.includes("afs/ads/i/") &&
              activeElement.getAttribute("id") === "slave-1-1"
            ) {
              window.pushEventParamsToGtm("T_AC_SECOND");
              window.pushEventParamsToGtm("T_AC");
              TACChangeCookie()
            }
          }

          if (src.includes("afs/ads?")) {
            if (activeElement.getAttribute("title")) {
              window.trackEventToPixel("T_AR");
              const searchParams = new URLSearchParams(window.location.search);
              const ttclid = searchParams.get("ttclid");
              // window.pushEventParamsToGtm("T_AR");
              pushEventToGTM('T_AR',{
                hi_country: window.youknowwho_ip_country || "unknown",
                hi_ip: window.youknowwho_ip || "unknown",
                hi_ttclid: ttclid || window.getCookie("hi_ttclid") || "unknown"
              })
              handleDataMonitor()
            } else {
              window.pushEventParamsToGtm("T_AC");
              TACChangeCookie()
            }
          } else if (
            src.includes("afs/ads/i/") &&
            !window.location.pathname.startsWith("/detail")
          ) {
            eventName = "T_AG";
          }

          if (eventName) {
            dataLayer.push({ event: eventName });
            window.done = true;
          }
        }
      });

      window.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "visible") {
          setTimeout(() => {
            window.done = false;
            window.done1 = false;
            window.focus();
          }, 0);
        }
      });

      function HandleMessageTACANDTAR(e) {
        if (window.done1) {
          return;
        }
        const activeElement = document.activeElement;
        const src = activeElement?.getAttribute("src") || "";
        if (src.includes("afs/ads?")) {
          if (!activeElement.getAttribute("title")) {
            window.trackEventToPixel("T_AC_MSG");

            dataLayer.push({ event: "T_AC_MSG", hi_time:handleTACMSGToLoad() });
            window.done1 = true;
          }
        } else if (
          src &&
          src.includes("afs/ads/i/") &&
          activeElement.getAttribute("id") === "slave-1-1" &&
          window.location.pathname.startsWith("/detail")
        ) {
          window.trackEventToPixel("T_AC_MSG");

          dataLayer.push({ event: "T_AC_MSG", hi_time:handleTACMSGToLoad() });
          window.done1 = true;
        }
      }

      //TAC和TAR埋点监听消息
      window.addEventListener("message", (e) => {
        if (typeof e.data === "string" && e?.data?.startsWith("FSXDC,.aCS:")) {
          HandleMessageTACANDTAR();
        }
      });
    </script>
