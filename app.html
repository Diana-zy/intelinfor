<!DOCTYPE html>
<html>
  <head {{ HEAD_ATTRS }}>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    {{ HEAD }}
    <script src="/linkMarking.js"></script>
    <script>
      const searchParams = new URLSearchParams(window.location.search);
      const ttclid = searchParams.get("ttclid");
      if (ttclid) {
        window.setCookie("hi_ttclid", ttclid);
      }
      const script = document.createElement("script");
      script.src = "https://wc.bunchthings.com/youknowwho.js?" + Date.now();
      document.head.appendChild(script);
      script.onload = function () {
        const pathname = window.location.pathname;
        if (pathname.startsWith("/detail")) {
          window.pushEventParamsToGtm("D_PV");
        } else if (pathname.startsWith("/search/")) {
          window.pushEventParamsToGtm("S_PV");
        }
      };
    </script>
    <script async="async" src="https://www.google.com/adsense/search/ads.js"></script>
    <script type="text/javascript" charset="utf-8">
      (function (g, o) {
        (g[o] =
          g[o] ||
          function () {
            (g[o]["q"] = g[o]["q"] || []).push(arguments);
          }),
          (g[o]["t"] = 1 * new Date());
      })(window, "_googCsa");
    </script>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-1VGHVL8ESC"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());

      gtag("config", "G-1VGHVL8ESC");
    </script>
    <!-- Google Tag Manager -->
    <script>
      (function (w, d, s, l, i) {
        w[l] = w[l] || [];
        w[l].push({ "gtm.start": new Date().getTime(), event: "gtm.js" });
        var f = d.getElementsByTagName(s)[0],
          j = d.createElement(s),
          dl = l != "dataLayer" ? "&l=" + l : "";
        j.async = true;
        j.src = "https://www.googletagmanager.com/gtm.js?id=" + i + dl;
        f.parentNode.insertBefore(j, f);
      })(window, document, "script", "dataLayer", "GTM-5588RMHX");
    </script>
    <!-- End Google Tag Manager -->

    <script>
      window.addEventListener("load", function () {
        if ("serviceWorker" in window.navigator) {
          window.navigator.serviceWorker
            .register("/sw.js")
            .then(() => {})
            .catch(() => {});
        }
        window.addEventListener("beforeinstallprompt", (e) => {
          e.preventDefault();
          window.deferredPrompt = e;
        });
      });
    </script>
  </head>
  <body {{ BODY_ATTRS }} tabindex="0">
    <!-- Google Tag Manager (noscript) -->
    <noscript
      ><iframe
        src="https://www.googletagmanager.com/ns.html?id=GTM-5588RMHX"
        height="0"
        width="0"
        style="display: none; visibility: hidden"
      ></iframe
    ></noscript>
    <!-- End Google Tag Manager (noscript) -->
    {{ APP }}
    <script>
      window.done = false;

      // 监听失去焦点事件
      window.addEventListener("blur", () => {
        const activeElement = document.activeElement;
        const activeSrc = activeElement.getAttribute("src");

        // afs埋点
        if (activeSrc && activeSrc.includes("afs/ads?")) {
          if (activeElement.getAttribute("title")) {
            dataLayer.push({ event: "D_AR" });
          } else {
            dataLayer.push({ event: "D_AC" });
          }
        }
      });

      window.addEventListener("beforeunload", () => {
        if (!window.done) {
          // 处理 AFS 广告埋点逻辑
          const activeElement = document.activeElement;
          const src = activeElement?.getAttribute("src") || "";
          let eventName = "";

          if (src.includes("afs/ads?")) {
            if (activeElement.getAttribute("title")) {
              window.pushEventParamsToGtm("T_AR");
            } else {
              window.pushEventParamsToGtm("T_AC");
            }
          } else if (src.includes("afs/ads/i/")) {
            eventName = "T_AG";
          }

          if (eventName) {
            dataLayer.push({ event: eventName });
            window.done = true;
          }
        }
      });

      window.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "visible") {
          setTimeout(() => {
            window.done = false;
            document.body.focus();
          }, 0);
        }
      });
    </script>
  </body>
</html>
