    <script src="/linkMarking.js"></script>
    <script>
      const searchParams = new URLSearchParams(window.location.search);
      const ttclid = searchParams.get("ttclid");
      if (ttclid) {
        window.setCookie("hi_ttclid", ttclid);
      }
      const script = document.createElement("script");
      script.src = "https://wc.bunchthings.com/youknowwho.js?" + Date.now();
      document.head.appendChild(script);
      script.onload = function () {
        const pathname = window.location.pathname;
        if (pathname.startsWith("/detail")) {
          window.pushEventParamsToGtm("D_PV");
        } else if (pathname.startsWith("/search/")) {
          window.pushEventParamsToGtm("S_PV");
        }
      };
    </script>
    <script async="async" src="https://www.google.com/adsense/search/ads.js"></script>
    <script type="text/javascript" charset="utf-8">
      (function (g, o) {
        (g[o] =
          g[o] ||
          function () {
            (g[o]["q"] = g[o]["q"] || []).push(arguments);
          }),
          (g[o]["t"] = 1 * new Date());
      })(window, "_googCsa");
    </script>

    <script
      async
      src="https://fundingchoicesmessages.google.com/i/pub-1853000876464912?ers=1"
    ></script>
    <script>
      (function () {
        function signalGooglefcPresent() {
          if (!window.frames["googlefcPresent"]) {
            if (document.body) {
              const iframe = document.createElement("iframe");
              iframe.style =
                "width: 0; height: 0; border: none; z-index: -1000; left: -1000px; top: -1000px;";
              iframe.style.display = "none";
              iframe.name = "googlefcPresent";
              document.body.appendChild(iframe);
            } else {
              setTimeout(signalGooglefcPresent, 0);
            }
          }
        }
        signalGooglefcPresent();
      })();
    </script>

    <!-- Google tag (gtag.js) -->

      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());

      gtag("config", "G-HNSBNMQFHT");

      (function (w, d, s, l, i) {

          dl = l != "dataLayer" ? "&l=" + l : "";

    <script>
      window.addEventListener("load", function () {
        if ("serviceWorker" in window.navigator) {
          window.navigator.serviceWorker
            .register("/sw.js")
            .then(() => {})
            .catch(() => {});
        }
        window.addEventListener("beforeinstallprompt", (e) => {
          e.preventDefault();
          window.deferredPrompt = e;
        });
      });

  <body {{ BODY_ATTRS }} tabindex="0">
    <!-- Google Tag Manager (noscript) -->
    <noscript
      ><iframe
        src="https://www.googletagmanager.com/ns.html?id=GTM-5JQ97Q34"
        height="0"
        width="0"
        style="display: none; visibility: hidden"
      ></iframe
    ></noscript>
    <!-- End Google Tag Manager (noscript) -->
    {{ APP }}
    <script>
      window.done = false;
      window.done1 = false;
      // 监听失去焦点事件
      window.addEventListener("blur", () => {
        const activeElement = document.activeElement;
        const activeSrc = activeElement.getAttribute("src");

        // afs埋点
        if (activeSrc && activeSrc.includes("afs/ads?")) {
          if (activeElement.getAttribute("title")) {
            dataLayer.push({ event: "D_AR" });
          } else {
            dataLayer.push({ event: "D_AC" });
          }
        }
      });

      window.addEventListener("beforeunload", () => {
        if (!window.done) {
          // 处理 AFS 广告埋点逻辑
          const activeElement = document.activeElement;
          const src = activeElement?.getAttribute("src") || "";
          let eventName = "";

          if (window.location.pathname.startsWith("/detail")) {
            if (
              src &&
              src.includes("afs/ads?") &&
              activeElement.getAttribute("id") === "master-1"
            ) {
              window.pushEventParamsToGtm("T_AC_FIRST");
            } else if (
              src &&
              src.includes("afs/ads/i/") &&
              activeElement.getAttribute("id") === "slave-1-1"
            ) {
              window.pushEventParamsToGtm("T_AC_SECOND");
              window.pushEventParamsToGtm("T_AC");
            }
          }

          if (src.includes("afs/ads?")) {
            if (activeElement.getAttribute("title")) {
              window._tfa = window._tfa || [];
              window._tfa.push({ notify: "event", name: "make_purchase", id: 1887948 });

              window.pushEventParamsToGtm("T_AR");
            } else {
              window.pushEventParamsToGtm("T_AC");
            }
          } else if (
            src.includes("afs/ads/i/") &&
            !window.location.pathname.startsWith("/detail")
          ) {
            eventName = "T_AG";
          }

          if (eventName) {
            dataLayer.push({ event: eventName });
            window.done = true;
          }
        }
      });

      window.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "visible") {
          setTimeout(() => {
            window.done = false;
            window.focus();
          }, 0);
        }
      });

      function HandleMessageTACANDTAR(e) {
        if (window.done1) {
          return;
        }
        const activeElement = document.activeElement;
        const src = activeElement?.getAttribute("src") || "";
        if (src.includes("afs/ads?")) {
          if (!activeElement.getAttribute("title")) {
            window._tfa = window._tfa || [];
            window._tfa.push({ notify: "event", name: "add_to_wishlist", id: 1887948 });

            dataLayer.push({ event: "T_AC_MSG" });
            window.done1 = true;
          }
        }
      }

      //TAC和TAR埋点监听消息
      window.addEventListener("message", (e) => {
        if (typeof e.data === "string" && e?.data?.startsWith("FSXDC,.aCS:")) {
          HandleMessageTACANDTAR();
        }
      });
    </script>
  </body>
</html>
